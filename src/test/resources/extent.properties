#=========================================
# EXTENT REPORTS SPARK CONFIGURATION
#=========================================
# Only keys the extentreports-cucumber7-adapter loader (ExtentService) actually
# reads belong here. Theme/colors/fonts/document title/dashboard toggles etc.
# are NOT flat properties - they live in the XML file referenced by
# extent.reporter.spark.config below (see extent-config.xml).

# ===== SPARK REPORTER =====
extent.reporter.spark.start=true
extent.reporter.spark.out=test-output/SparkReports/Index.html
extent.reporter.spark.config=src/test/resources/extent-config.xml

# View order: comma-separated ViewName values (dashboard,test,category,exception,log,author,device)
extent.reporter.spark.vieworder=dashboard,test,category,exception,log

# ===== FOLDER AND TIME SETTINGS =====
basefolder.name=target/ExtentReports
basefolder.datetimepattern=yyyy-MM-dd_HH-mm-ss

# ===== SCREENSHOT CONFIGURATION =====
# Index.html is written under <basefolder>/test-output/SparkReports/, so the
# screenshot dir and its report-relative path must both resolve from there.
# NOTE: the adapter builds the <img> src via plain string concatenation
# (screenshot.rel.path + filename, no separator inserted) - the trailing
# slash below is required or the src ends up as "screenshotsembedded1.png".
screenshot.dir=test-output/SparkReports/screenshots
screenshot.rel.path=screenshots/

# ===== SYSTEM INFO =====
# Real key prefix is "systeminfo." (not "system.info."), and it takes literal
# label=value pairs - it does not auto-detect OS/Java version from booleans.
systeminfo.Environment=QA
systeminfo.Browser=Chrome
systeminfo.Platform=macOS
systeminfo.Execution Mode=Parallel
systeminfo.Release Version=v1.0.0
systeminfo.Test Type=E2E Automation
